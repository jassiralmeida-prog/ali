<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Spotify</title>

<style>

body{
background:#121212;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.player{
width:320px;
background:#181818;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.cover{
width:100%;
height:180px;
border-radius:8px;
background-size:cover;
background-position:center;
margin-bottom:15px;
}

.title{
font-size:18px;
font-weight:bold;
}

.artist{
color:#b3b3b3;
font-size:14px;
margin-bottom:15px;
}

.controls{
display:flex;
justify-content:center;
gap:15px;
margin:15px 0;
}

button{
background:#1DB954;
border:none;
width:45px;
height:45px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

.progress{
width:100%;
height:6px;
background:#444;
border-radius:5px;
cursor:pointer;
}

.bar{
height:6px;
background:#1DB954;
width:0%;
border-radius:5px;
}

.time{
display:flex;
justify-content:space-between;
font-size:12px;
color:#aaa;
margin-top:5px;
}

/* PLAYLIST CON SCROLL */
.playlist{
margin-top:15px;
max-height:200px;
overflow-y:auto;
}

/* SCROLL ESTILO SPOTIFY */
.playlist::-webkit-scrollbar{
width:6px;
}

.playlist::-webkit-scrollbar-track{
background:#181818;
}

.playlist::-webkit-scrollbar-thumb{
background:#1DB954;
border-radius:10px;
}

.song{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.song:hover{
background:#282828;
}

.active{
background:#1DB954;
color:black;
}

</style>
</head>

<body>

<div class="player">

<div class="cover" id="cover"></div>

<div class="title" id="title"></div>
<div class="artist" id="artist"></div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" id="play">▶</button>
<button onclick="next()">⏭</button>
</div>

<div class="progress" onclick="seek(event)">
<div class="bar" id="bar"></div>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="playlist" id="playlist"></div>

</div>

<audio id="audio"></audio>

<script>

const songs=[

{
title:"Svag",
artist:"Victor Leksell",
src:"Victor Leksell - Svag.mp3",
cover:"https://lyrics.lyricfind.com/_next/image?url=%2Fimages%2Fv2%2Fcover_art%2Fcuration%2Foriginal%2F2%2F8%2F2%2Ff%2F6332-197d-421d-8c50-62f3359ac99a.jpg&w=3840&q=75"
},

{
title:"Media Luna",
artist:"Mora🍇",
src:"Mora - MEDIA LUNA.mp3",
cover:"https://i.scdn.co/image/ab67616d0000b2736f78adeb660b81a1c286a64f"
},

{
title:"Blanquita",
artist:"Kris r",
src:"KRIS R - BLANQUITA.mp3",
cover:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSNMHENKU5SJdH8X-jo4fnzzQHmKLMfgqvbQw&s"
},

{
title:"Dandelions",
artist:"Ruth B",
src:"Dandelions.mp3",
cover:"https://i.ytimg.com/vi/W8a4sUabCUo/mqdefault.jpg"
},

{
title:"Those Eyes",
artist:"New West",
src:"Those Eyes.mp3",
cover:"proyecto.jpeg"
},

{
title:"Vamonos a marte",
artist:"Kevin Kaarl",
src:"Kevin Kaarl - Vamonos a Marte.mp3",
cover:"https://i.scdn.co/image/ab67616d0000b273a7558dd7d6526ad0856de685"
},

{
title:"Cristina",
artist:"Sesbatian Yatra",
src:"Sebastián Yatra - Cristina.mp3",
cover:"https://i.scdn.co/image/ab67616d0000b27387632ea37f5d02b9740e2fdc"
},

{
title:"Me Voy Enamorando",
artist:"Chino Y Nacho",
src:"Me Voy Enamorando.mp3",
cover:"https://i.ytimg.com/vi/EiOP62FB17E/sddefault.jpg"
},

{
title:"Darte Un Beso",
artist:"Prince Royce",
src:"Prince Royce - Darte un Beso.mp3",
cover:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTL9JCEy3xJ23e618UxYeSPgkdza3rrtMTzog&s"
},

{
title:"MIL VIDAS",
artist:"Mora, Ryan Castro",
src:"MIL VIDAS.mp3",
cover:"https://images.genius.com/9b4acd648c12aa172b1b4ec9f8eaf4da.1000x1000x1.png"
},

]

let index=0

const audio=document.getElementById("audio")
const cover=document.getElementById("cover")
const title=document.getElementById("title")
const artist=document.getElementById("artist")
const playBtn=document.getElementById("play")
const bar=document.getElementById("bar")
const playlist=document.getElementById("playlist")
const current=document.getElementById("current")
const duration=document.getElementById("duration")

function loadSong(i){

const song=songs[i]

audio.src=song.src
title.innerText=song.title
artist.innerText=song.artist
cover.style.backgroundImage="url("+song.cover+")"

document.querySelectorAll(".song").forEach(e=>e.classList.remove("active"))
document.getElementById("song"+i).classList.add("active")

}

function toggle(){

if(audio.paused){
audio.play()
playBtn.innerHTML="❚❚"
}else{
audio.pause()
playBtn.innerHTML="▶"
}

}

function next(){

index++
if(index>=songs.length) index=0
loadSong(index)
audio.play()
playBtn.innerHTML="❚❚"

}

function prev(){

index--
if(index<0) index=songs.length-1
loadSong(index)
audio.play()
playBtn.innerHTML="❚❚"

}

audio.addEventListener("timeupdate",()=>{

const progress=(audio.currentTime/audio.duration)*100
bar.style.width=progress+"%"

current.innerText=format(audio.currentTime)

})

audio.addEventListener("loadedmetadata",()=>{

duration.innerText=format(audio.duration)

})

function seek(e){

const width=e.currentTarget.clientWidth
const clickX=e.offsetX
audio.currentTime=(clickX/width)*audio.duration

}

function format(t){

let m=Math.floor(t/60)
let s=Math.floor(t%60)

if(s<10) s="0"+s

return m+":"+s

}

songs.forEach((s,i)=>{

const div=document.createElement("div")
div.className="song"
div.id="song"+i
div.innerText=s.title+" - "+s.artist

div.onclick=()=>{

index=i
loadSong(i)
audio.play()
playBtn.innerHTML="❚❚"

}

playlist.appendChild(div)

})

loadSong(index)

</script>

</body>
</html>
